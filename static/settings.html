<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Settings - ShowTime</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="topbar">
            <a class="site-title" href="index.html"><h1>📺 ShowTime</h1></a>
            <nav>
                <a class="btn" href="index.html">← Back</a>
            </nav>
        </div>

        <main>
            <div class="form-page">
                <h2>Settings</h2>
                <div id="container">
                    <div class="loading">Loading…</div>
                </div>
            </div>
        </main>

        <script src="app.js"></script>
        <script>
            const container = document.getElementById("container");

            function escapeHtml(str) {
                const d = document.createElement("div");
                d.textContent = str || "";
                return d.innerHTML;
            }

            function renderAddForm() {
                container.innerHTML = `
        <p style="color:var(--text-dim); font-size:13px;">
          Paste your TMDB API key (v3 auth). Get one free at
          themoviedb.org → Settings → API.
        </p>
        <label for="apiKey">TMDB API Key</label>
        <input id="apiKey" type="text" placeholder="your api key">
        <div class="actions">
          <button class="btn btn-primary" id="saveBtn">Save</button>
        </div>
        <div class="msg" id="msg"></div>
      `;

                const input = document.getElementById("apiKey");
                const saveBtn = document.getElementById("saveBtn");
                const msg = document.getElementById("msg");

                saveBtn.addEventListener("click", async () => {
                    const key = input.value.trim();
                    if (!key) {
                        msg.textContent = "Please enter an API key.";
                        msg.className = "msg error";
                        return;
                    }
                    saveBtn.disabled = true;
                    saveBtn.textContent = "Saving…";
                    try {
                        await api("/settings/apikey", {
                            method: "POST",
                            body: JSON.stringify({ api_key: key }),
                        });
                        load();
                    } catch (e) {
                        msg.textContent = e.message;
                        msg.className = "msg error";
                        saveBtn.disabled = false;
                        saveBtn.textContent = "Save";
                    }
                });

                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") saveBtn.click();
                });
            }

            function renderKeySet(maskedKey) {
                container.innerHTML = `
        <p style="color:var(--text-dim); font-size:13px;">
          A TMDB API key is currently set.
        </p>
        <label>TMDB API Key</label>
        <input type="text" value="${escapeHtml(maskedKey)}" disabled>
        <div class="actions">
          <button class="btn" id="refreshAllBtn">Refresh All Shows</button>
          <a class="btn" href="/api/export" download>Download Backup</a>
          <button class="btn btn-danger" id="deleteBtn">Delete API Key</button>
        </div>
        <div class="msg" id="msg"></div>
      `;

                const refreshAllBtn = document.getElementById("refreshAllBtn");
                const deleteBtn = document.getElementById("deleteBtn");
                const msg = document.getElementById("msg");

                refreshAllBtn.addEventListener("click", async () => {
                    // Lock the current width so swapping in the shorter
                    // "Refreshing…" label doesn't make the button shrink.
                    refreshAllBtn.style.minWidth = `${refreshAllBtn.offsetWidth}px`;
                    refreshAllBtn.disabled = true;
                    refreshAllBtn.textContent = "Refreshing…";
                    msg.textContent = "";
                    msg.className = "msg";
                    try {
                        const result = await api("/shows/refresh-all", {
                            method: "POST",
                        });
                        const parts = [
                            `Refreshed ${result.refreshed} show${result.refreshed === 1 ? "" : "s"}.`,
                        ];
                        if (result.failed) parts.push(`${result.failed} failed.`);
                        msg.textContent = parts.join(" ");
                        msg.className = "msg";
                    } catch (e) {
                        msg.textContent = e.message;
                        msg.className = "msg error";
                    } finally {
                        refreshAllBtn.disabled = false;
                        refreshAllBtn.textContent = "Refresh All Shows";
                        refreshAllBtn.style.minWidth = "";
                    }
                });

                deleteBtn.addEventListener("click", async () => {
                    if (
                        !confirm(
                            "Remove the saved TMDB API key? You'll need to add it again to fetch or refresh shows.",
                        )
                    )
                        return;
                    deleteBtn.disabled = true;
                    deleteBtn.textContent = "Deleting…";
                    try {
                        await api("/settings/apikey", { method: "DELETE" });
                        load();
                    } catch (e) {
                        msg.textContent = e.message;
                        msg.className = "msg error";
                        deleteBtn.disabled = false;
                        deleteBtn.textContent = "Delete API Key";
                    }
                });
            }

            async function load() {
                try {
                    const s = await api("/settings");
                    if (s.has_api_key) {
                        renderKeySet(s.masked_key);
                    } else {
                        renderAddForm();
                    }
                } catch (e) {
                    container.innerHTML = `<div class="msg error">Could not load settings: ${escapeHtml(e.message)}</div>`;
                }
            }

            load();
        </script>
    </body>
</html>
