<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - ShowTime</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <a class="site-title" href="index.html"><h1>📺 ShowTime</h1></a>
    <nav>
      <a class="btn" href="index.html">← Back</a>
    </nav>
  </div>

  <main>
    <div class="form-page">
      <h2>Settings</h2>
      <p style="color:var(--text-dim); font-size:13px;">
        Paste your TMDB API key (v3 auth). Get one free at
        themoviedb.org → Settings → API.
      </p>
      <label for="apiKey">TMDB API Key</label>
      <input id="apiKey" type="text" placeholder="your api key">
      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
      <div class="msg" id="msg"></div>
      <div class="msg" id="status" style="margin-top:4px;"></div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    const input = document.getElementById("apiKey");
    const saveBtn = document.getElementById("saveBtn");
    const msg = document.getElementById("msg");
    const statusEl = document.getElementById("status");

    async function loadStatus() {
      try {
        const s = await api("/settings");
        statusEl.textContent = s.has_api_key
          ? "An API key is currently set."
          : "No API key set yet.";
        statusEl.className = "msg";
      } catch (e) {
        statusEl.textContent = "Could not check current settings.";
      }
    }

    saveBtn.addEventListener("click", async () => {
      const key = input.value.trim();
      if (!key) {
        msg.textContent = "Please enter an API key.";
        msg.className = "msg error";
        return;
      }
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving…";
      try {
        await api("/settings/apikey", {
          method: "POST",
          body: JSON.stringify({ api_key: key }),
        });
        msg.textContent = "Saved.";
        msg.className = "msg success";
        input.value = "";
        loadStatus();
      } catch (e) {
        msg.textContent = e.message;
        msg.className = "msg error";
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save";
      }
    });

    loadStatus();
  </script>
</body>
</html>
